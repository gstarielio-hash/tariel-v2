<!-- Contrato canonico de entrypoint do portal cliente. Nao reordenar sem atualizar portal.js, smoke e docs 34/35. -->

<script src="/static/js/cliente/portal_shared_helpers.js?v={{ v_app }}" defer data-portal-contract="cliente" data-portal-module="sharedHelpers"></script>
<script src="/static/js/cliente/portal_shell.js?v={{ v_app }}" defer data-portal-contract="cliente" data-portal-module="shell"></script>
<script src="/static/js/cliente/portal_bindings.js?v={{ v_app }}" defer data-portal-contract="cliente" data-portal-module="bindings"></script>
<script src="/static/js/cliente/portal.js?v={{ v_app }}" defer data-portal-contract="cliente" data-portal-module="portal"></script>
