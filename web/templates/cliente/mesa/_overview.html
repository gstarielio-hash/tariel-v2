<section
    id="mesa-overview"
    class="surface-stage"
    data-mesa-panel="overview"
    role="tabpanel"
    aria-labelledby="mesa-section-tab-overview"
    {% if (cliente_mesa_section_inicial | default('overview')) != 'overview' %}hidden{% endif %}
>
    <div class="surface-stage-head">
        <div>
            <span class="surface-stage-kicker">Visao geral</span>
            <h3>Pulso tecnico da mesa</h3>
            <p class="box-subtitle">Volume da fila e foco tecnico do momento.</p>
        </div>
    </div>

    <div id="mesa-resumo-geral" class="summary-grid workspace-metrics"></div>
</section>
