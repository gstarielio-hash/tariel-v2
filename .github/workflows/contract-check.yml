name: contract-check

on:
  push:
    branches:
      - main
      - "checkpoint/**"
      - "feature/**"
      - "codex/**"
  pull_request:

concurrency:
  group: contract-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-check:
    if: ${{ vars.ENABLE_HOSTED_CI != 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      AMBIENTE: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: web/requirements.txt

      - name: Install backend dependencies
        working-directory: web
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Contract check
        run: make contract-check
