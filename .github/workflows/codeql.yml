name: codeql

on:
  push:
    branches:
      - main
      - "checkpoint/**"
      - "feature/**"
      - "codex/**"
  pull_request:
    branches:
      - main
      - "checkpoint/**"
      - "feature/**"
      - "codex/**"
  schedule:
    - cron: "15 9 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    if: ${{ vars.ENABLE_CODEQL != 'false' }}
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        language:
          - python
          - javascript-typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
