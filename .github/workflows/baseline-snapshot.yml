name: baseline-snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * 1"

concurrency:
  group: baseline-snapshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      AMBIENTE: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: web/requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: android/package-lock.json

      - name: Install backend dependencies
        working-directory: web
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Android dependencies
        working-directory: android
        run: npm ci

      - name: Generate baseline snapshot
        run: make baseline-snapshot

      - name: Upload baseline snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: baseline-snapshot
          path: .tmp_online/baseline
          if-no-files-found: error
