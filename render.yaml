services:
  - type: web
    name: tariel-web
    runtime: python
    rootDir: web
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: AMBIENTE
        value: production
      - key: REVISOR_REALTIME_BACKEND
        value: redis
      - key: REVISOR_REALTIME_FAIL_CLOSED_ON_STARTUP
        value: "0"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: tariel-web-realtime
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: tariel-web-db
          property: connectionString
      - key: DB_BOOTSTRAP_MAX_ATTEMPTS
        value: "8"
      - key: DB_BOOTSTRAP_RETRY_BASE_SECONDS
        value: "2"
      - key: DB_BOOTSTRAP_RETRY_MAX_SECONDS
        value: "15"
      - key: DB_BOOTSTRAP_BLOCKING_STARTUP
        value: "0"
      - key: DB_BOOTSTRAP_BACKGROUND_RETRY_BASE_SECONDS
        value: "15"
      - key: DB_BOOTSTRAP_BACKGROUND_RETRY_MAX_SECONDS
        value: "60"
      - key: DB_BOOTSTRAP_RUN_MIGRATIONS
        value: "1"
      - key: DB_SQLALCHEMY_DRIVER
        value: pg8000
      - key: DB_SSLMODE
        value: disable
      - key: DB_CONNECT_TIMEOUT
        value: "10"
      - key: DB_APPLICATION_NAME
        value: tariel-web
      - key: DB_POOL_SIZE
        value: "3"
      - key: DB_MAX_OVERFLOW
        value: "0"
      - key: DB_POOL_TIMEOUT
        value: "30"
      - key: DB_POOL_RECYCLE
        value: "300"
      - key: PASTA_UPLOADS_PERFIS
        value: static/uploads/perfis
      - key: PASTA_ANEXOS_MESA
        value: static/uploads/mesa_anexos
      - key: PASTA_APRENDIZADOS_VISUAIS_IA
        value: static/uploads/aprendizados_ia
      - key: TARIEL_UPLOADS_STORAGE_MODE
        value: local_fs
      - key: TARIEL_UPLOADS_PROFILE_RETENTION_DAYS
        value: "365"
      - key: TARIEL_UPLOADS_MESA_RETENTION_DAYS
        value: "365"
      - key: TARIEL_UPLOADS_LEARNING_RETENTION_DAYS
        value: "365"
      - key: TARIEL_UPLOADS_CLEANUP_ENABLED
        value: "1"
      - key: TARIEL_UPLOADS_CLEANUP_GRACE_DAYS
        value: "14"
      - key: TARIEL_UPLOADS_CLEANUP_INTERVAL_HOURS
        value: "24"
      - key: TARIEL_UPLOADS_CLEANUP_MAX_DELETIONS_PER_RUN
        value: "200"
      - key: TARIEL_UPLOADS_BACKUP_REQUIRED
        value: "0"
      - key: TARIEL_UPLOADS_RESTORE_DRILL_REQUIRED
        value: "0"
      - key: SESSAO_FAIL_CLOSED_ON_DB_ERROR
        value: "1"
      - key: CHAVE_SECRETA_APP
        sync: false
      - key: CHAVE_API_GEMINI
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_ADMIN_NOME
        value: Administrador Tariel.ia
      - key: BOOTSTRAP_EMPRESA_NOME
        value: Tariel.ia
      - key: BOOTSTRAP_EMPRESA_CNPJ
        value: "11111111111111"
      - key: SESSION_COOKIE_NAME
        value: cracha_tariel_seguro
      - key: SEED_DEV_BOOTSTRAP
        value: "0"

  - type: keyvalue
    name: tariel-web-realtime
    region: oregon
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: tariel-web-db
    plan: free
    storageAutoscalingEnabled: false
