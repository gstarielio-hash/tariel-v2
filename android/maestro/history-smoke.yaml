appId: com.tarielia.inspetor
tags:
  - smoke
  - history
env:
  LOGIN_EMAIL: ${MAESTRO_LOGIN_EMAIL}
  LOGIN_PASSWORD: ${MAESTRO_LOGIN_PASSWORD}
---
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      id: login-email-input
    timeout: 30000

- tapOn:
    id: login-email-input

- inputText: ${LOGIN_EMAIL}

- hideKeyboard

- tapOn:
    id: login-password-input

- inputText: ${LOGIN_PASSWORD}

- hideKeyboard

- tapOn:
    id: login-submit-button

- extendedWaitUntil:
    visible:
      id: open-history-button
    timeout: 20000

- tapOn:
    id: open-history-button

- assertVisible:
    id: history-drawer

- assertVisible:
    id: history-search-input

- assertVisible:
    id: history-summary-card

- runFlow:
    when:
      visible:
        id: history-first-item-button
    commands:
      - tapOn:
          id: history-first-item-button
      - extendedWaitUntil:
          visible:
            id: chat-tab-button
          timeout: 10000
      - tapOn:
          id: open-history-button
      - assertVisible:
          id: history-drawer

- tapOn:
    id: close-history-drawer-button

- assertVisible:
    id: chat-tab-button
