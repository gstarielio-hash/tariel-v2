appId: com.tarielia.inspetor
tags:
  - keyboard
  - chat
env:
  LOGIN_EMAIL: ${MAESTRO_LOGIN_EMAIL}
  LOGIN_PASSWORD: ${MAESTRO_LOGIN_PASSWORD}
---
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      id: login-email-input
    timeout: 30000

- tapOn:
    id: login-email-input

- inputText: ${LOGIN_EMAIL}

- hideKeyboard

- tapOn:
    id: login-password-input

- inputText: ${LOGIN_PASSWORD}

- hideKeyboard

- tapOn:
    id: login-submit-button

- extendedWaitUntil:
    visible:
      id: chat-composer-input
    timeout: 20000

- tapOn:
    id: chat-composer-input

- inputText: Conferindo teclado no chat

- assertVisible:
    id: chat-composer-input

- assertVisible:
    id: chat-attach-button

- assertVisible:
    id: chat-send-button

- takeScreenshot: chat-keyboard-visible
